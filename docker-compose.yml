services:
  build:
    image: golang:1.22-alpine
    working_dir: /src
    volumes:
      - .:/src
      - go-cache:/go/pkg/mod
    environment:
      - CGO_ENABLED=0
      - GOOS=windows
      - GOARCH=amd64
    command: sh -c "go mod tidy && mkdir -p bin && go build -ldflags='-s -w' -o bin/webterm.exe ."

  test:
    image: golang:1.22-alpine
    working_dir: /src
    volumes:
      - .:/src
      - go-cache:/go/pkg/mod
    environment:
      - CGO_ENABLED=0
      - GOOS=windows
      - GOARCH=amd64
    command: sh -c "go mod tidy && mkdir -p bin && go test -c -o bin/webterm_test.exe ."

volumes:
  go-cache:
