<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webterm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0d1117; overflow: hidden; font-family: Consolas, 'Courier New', monospace; color: #c9d1d9; }

    #app { display: flex; flex-direction: column; height: 100%; }
    #main-area { display: flex; flex: 1; overflow: hidden; }

    /* --- Sidebar --- */
    #sidebar {
      width: 260px; flex-shrink: 0;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex; flex-direction: column;
    }
    #sidebar-header {
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      background: #0d1117;
      font-size: 11px;
    }
    #sidebar-path {
      color: #8b949e;
      word-break: break-all;
      line-height: 1.4;
    }
    #sidebar-branch {
      color: #58a6ff;
      margin-top: 3px;
    }
    #file-list {
      flex: 1; overflow-y: auto; padding: 2px 0;
    }
    .file-entry {
      display: flex; align-items: center;
      padding: 2px 12px 2px 12px;
      cursor: pointer;
      font-size: 13px; line-height: 22px;
      user-select: none;
    }
    .file-entry:hover { background: #1c2128; }
    .file-icon { width: 18px; flex-shrink: 0; color: #484f58; font-size: 11px; }
    .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .is-dir .file-icon { color: #58a6ff; }
    .is-dir .file-name { color: #58a6ff; }
    .git-badge {
      font-size: 10px; font-weight: 700;
      margin-left: 6px; flex-shrink: 0;
    }
    .git-M  { color: #d29922; }
    .git-A  { color: #3fb950; }
    .git-D  { color: #f85149; }
    .git-R  { color: #a371f7; }
    .git-U  { color: #8b949e; }

    /* --- Terminal --- */
    #terminal-wrap { flex: 1; overflow: hidden; }
    #terminal { height: 100%; }

    /* --- Status bar --- */
    #status-bar {
      height: 26px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      color: #8b949e;
      flex-shrink: 0;
      gap: 6px;
    }
    .stat-item { display: flex; align-items: center; gap: 5px; }
    .stat-label { color: #484f58; font-size: 11px; }
    .stat-value { color: #c9d1d9; font-size: 11px; font-variant-numeric: tabular-nums; }
    .stat-bar {
      display: inline-block;
      width: 48px; height: 4px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
    }
    .stat-bar-fill {
      display: block;
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }
    .bar-cpu { background: #58a6ff; }
    .bar-ram { background: #3fb950; }
    .bar-gpu { background: #a371f7; }
    .stat-sep {
      width: 1px; height: 14px;
      background: #30363d;
      margin: 0 4px;
    }

    /* --- Editor --- */
    #editor-wrap {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    #editor-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; height: 36px;
      background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
    }
    #editor-title { display: flex; align-items: center; overflow: hidden; min-width: 0; }
    #editor-filename {
      font-size: 13px; color: #c9d1d9;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #editor-modified { color: #d29922; margin-left: 6px; display: none; font-size: 16px; }
    #editor-status { font-size: 11px; color: #3fb950; margin-left: 8px; opacity: 0; transition: opacity 0.3s; }
    .editor-btn {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      padding: 3px 12px; font-size: 12px; cursor: pointer;
      border-radius: 4px; font-family: inherit; margin-left: 6px;
    }
    .editor-btn:hover { background: #30363d; }
    .editor-btn-save { color: #3fb950; }
    #editor-content {
      flex: 1; background: #0d1117; color: #c9d1d9;
      border: none; outline: none; resize: none;
      padding: 8px 12px;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 14px; line-height: 1.5; tab-size: 4;
    }
    .file-entry.active { background: #1c2128; }

    /* scrollbar */
    #file-list::-webkit-scrollbar { width: 6px; }
    #file-list::-webkit-scrollbar-track { background: transparent; }
    #file-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="main-area">
    <div id="sidebar">
      <div id="sidebar-header">
        <div id="sidebar-path"></div>
        <div id="sidebar-branch"></div>
      </div>
      <div id="file-list"></div>
    </div>
    <div id="terminal-wrap">
      <div id="terminal"></div>
    </div>
    <div id="editor-wrap">
      <div id="editor-header">
        <div id="editor-title">
          <span id="editor-filename"></span>
          <span id="editor-modified">●</span>
          <span id="editor-status"></span>
        </div>
        <div>
          <button class="editor-btn editor-btn-save" id="editor-save" title="Ctrl+S">Save</button>
          <button class="editor-btn" id="editor-close">Close</button>
        </div>
      </div>
      <textarea id="editor-content" spellcheck="false"></textarea>
    </div>
    </div>
    <div id="status-bar">
      <div class="stat-item">
        <span class="stat-label">CPU</span>
        <span class="stat-bar"><span id="bar-cpu" class="stat-bar-fill bar-cpu"></span></span>
        <span id="stat-cpu" class="stat-value">&mdash;</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <span class="stat-label">RAM</span>
        <span class="stat-bar"><span id="bar-ram" class="stat-bar-fill bar-ram"></span></span>
        <span id="stat-ram" class="stat-value">&mdash;</span>
      </div>
      <div id="stat-gpu-sep" class="stat-sep" style="display:none"></div>
      <div id="stat-gpu-wrap" class="stat-item" style="display:none">
        <span class="stat-label">GPU</span>
        <span class="stat-bar"><span id="bar-gpu" class="stat-bar-fill bar-gpu"></span></span>
        <span id="stat-gpu" class="stat-value">&mdash;</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <span class="stat-label">NET</span>
        <span id="stat-net" class="stat-value">&mdash;</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>
  <script>
    // ---- Terminal ----
    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      theme: { background: "#0d1117" },
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById("terminal"));
    fitAddon.fit();

    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.binaryType = "arraybuffer";

    ws.onopen = () => {
      ws.send("\x01" + JSON.stringify({ cols: term.cols, rows: term.rows }));
    };
    ws.onmessage = (e) => {
      const data = typeof e.data === "string" ? e.data : new Uint8Array(e.data);
      term.write(data);
    };
    ws.onclose = () => term.write("\r\n\x1b[31m[connection closed]\x1b[0m\r\n");

    term.onData((data) => ws.send(data));
    term.onResize(({ cols, rows }) => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send("\x01" + JSON.stringify({ cols, rows }));
      }
    });
    window.addEventListener("resize", () => fitAddon.fit());

    // ---- File panel (tree view) ----
    let currentPath = "";
    let expandedDirs = new Set();
    let dirCache = {};
    let editorFilePath = null;
    let editorOriginal = '';
    let editorModified = false;
    let editorLineEnding = '\n';

    function samePath(a, b) {
      const norm = p => p.replace(/\\/g, '/').replace(/\/+$/, '').toLowerCase();
      return a && b && norm(a) === norm(b);
    }

    function pathSep(p) { return p.includes("/") ? "/" : "\\"; }

    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function gitBadge(status) {
      if (!status) return "";
      const first = status[0] !== "?" ? status[0] : "";
      const second = status.length > 1 ? status[1] : "";
      let label, cls;
      if (status === "??") { label = "?"; cls = "git-U"; }
      else if (first === "A")  { label = "A"; cls = "git-A"; }
      else if (first === "R")  { label = "R"; cls = "git-R"; }
      else if (first === "D" || second === "D") { label = "D"; cls = "git-D"; }
      else if (first === "M" || second === "M") { label = "M"; cls = "git-M"; }
      else { label = status; cls = "git-U"; }
      return `<span class="git-badge ${cls}">${label}</span>`;
    }

    async function fetchDir(path) {
      const params = path ? `?path=${encodeURIComponent(path)}` : "";
      const resp = await fetch(`/api/files${params}`);
      const data = await resp.json();
      if (data.error) return null;
      dirCache[data.path] = data;
      return data;
    }

    async function loadRoot(path) {
      expandedDirs.clear();
      dirCache = {};
      const data = await fetchDir(path);
      if (!data) return;
      currentPath = data.path;
      document.getElementById("sidebar-path").textContent = currentPath;
      document.getElementById("sidebar-branch").textContent =
        data.gitBranch ? "\u2387 " + data.gitBranch : "";
      renderTree();
    }

    async function toggleDir(dirPath) {
      if (expandedDirs.has(dirPath)) {
        expandedDirs.delete(dirPath);
        const prefix = dirPath.toLowerCase() + '/';
        const prefixB = dirPath.toLowerCase() + '\\';
        for (const p of [...expandedDirs]) {
          const lp = p.toLowerCase();
          if (lp.startsWith(prefix) || lp.startsWith(prefixB)) expandedDirs.delete(p);
        }
        renderTree();
      } else {
        if (!dirCache[dirPath]) {
          const data = await fetchDir(dirPath);
          if (!data) return;
        }
        expandedDirs.add(dirPath);
        renderTree();
      }
    }

    function renderTree() {
      const list = document.getElementById("file-list");
      const root = dirCache[currentPath];
      if (!root) { list.innerHTML = ''; return; }
      list.innerHTML = renderEntries(root.entries, currentPath, 0);
    }

    function renderEntries(entries, parentPath, depth) {
      const sep = pathSep(parentPath);
      const pad = 12 + depth * 16;
      let html = '';
      for (const f of entries) {
        const fullPath = parentPath + sep + f.name;
        const expanded = f.isDir && expandedDirs.has(fullPath);
        const dirCls = f.isDir ? " is-dir" : "";
        const activeCls = !f.isDir && editorFilePath && samePath(fullPath, editorFilePath) ? " active" : "";
        const icon = f.isDir ? (expanded ? "\u25BE" : "\u25B8") : "\u00B7";
        html += `<div class="file-entry${dirCls}${activeCls}" ${f.isDir ? `data-dir="${esc(fullPath)}"` : `data-file="${esc(fullPath)}"`} style="padding-left:${pad}px">
          <span class="file-icon">${icon}</span>
          <span class="file-name">${esc(f.name)}</span>
          ${gitBadge(f.git)}
        </div>`;
        if (expanded && dirCache[fullPath]) {
          html += renderEntries(dirCache[fullPath].entries, fullPath, depth + 1);
        }
      }
      return html;
    }

    document.getElementById("file-list").addEventListener("click", (e) => {
      const entry = e.target.closest(".file-entry");
      if (!entry) return;
      if (entry.dataset.dir !== undefined) toggleDir(entry.dataset.dir);
      else if (entry.dataset.file !== undefined) openFile(entry.dataset.file);
    });

    // CWD tracking via OSC 7 — sync file panel with terminal directory
    term.parser.registerOscHandler(7, (data) => {
      let path = data;
      if (path.startsWith('file://')) {
        try { path = decodeURIComponent(new URL(path).pathname); } catch(e) { return true; }
        if (/^\/[A-Za-z]:/.test(path)) path = path.slice(1);
      }
      if (path && !samePath(path, currentPath)) {
        loadRoot(path);
      }
      return true;
    });

    // ---- File editor ----
    function isEditorModified() {
      return document.getElementById('editor-content').value !== editorOriginal.replace(/\r\n/g, '\n');
    }

    async function openFile(path) {
      if (editorFilePath && isEditorModified()) {
        if (!confirm('You have unsaved changes. Discard?')) return;
      }
      try {
        const resp = await fetch('/api/file?path=' + encodeURIComponent(path));
        const data = await resp.json();
        if (data.error) { alert(data.error); return; }
        editorFilePath = data.path;
        editorOriginal = data.content;
        editorLineEnding = data.content.includes('\r\n') ? '\r\n' : '\n';
        document.getElementById('editor-filename').textContent = data.path.split(/[/\\]/).pop();
        document.getElementById('editor-filename').title = data.path;
        document.getElementById('editor-content').value = data.content;
        document.getElementById('editor-modified').style.display = 'none';
        document.getElementById('editor-status').style.opacity = '0';
        editorModified = false;
        document.getElementById('terminal-wrap').style.display = 'none';
        document.getElementById('editor-wrap').style.display = 'flex';
        renderTree();
      } catch(e) {
        alert('Read error:' + e.message);
      }
    }

    async function saveFile() {
      if (!editorFilePath) return;
      let content = document.getElementById('editor-content').value;
      if (editorLineEnding === '\r\n') content = content.replace(/\n/g, '\r\n');
      try {
        const resp = await fetch('/api/file?path=' + encodeURIComponent(editorFilePath), {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({content})
        });
        const data = await resp.json();
        if (data.error) { alert('Save error: ' + data.error); return; }
        editorOriginal = content;
        editorModified = false;
        document.getElementById('editor-modified').style.display = 'none';
        const st = document.getElementById('editor-status');
        st.textContent = 'Saved';
        st.style.opacity = '1';
        setTimeout(() => { st.style.opacity = '0'; }, 2000);
      } catch(e) {
        alert('Save error: ' + e.message);
      }
    }

    function closeEditor() {
      if (isEditorModified() && !confirm('You have unsaved changes. Close?')) return;
      editorFilePath = null;
      document.getElementById('editor-wrap').style.display = 'none';
      document.getElementById('terminal-wrap').style.display = '';
      fitAddon.fit();
      term.focus();
      renderTree();
    }

    document.getElementById('editor-content').addEventListener('input', () => {
      const mod = isEditorModified();
      if (mod !== editorModified) {
        editorModified = mod;
        document.getElementById('editor-modified').style.display = mod ? 'inline' : 'none';
      }
    });

    document.getElementById('editor-content').addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const ta = e.target;
        const start = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.substring(0, start) + '\t' + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + 1;
        ta.dispatchEvent(new Event('input'));
      }
    });

    document.getElementById('editor-save').addEventListener('click', saveFile);
    document.getElementById('editor-close').addEventListener('click', closeEditor);

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 's' && editorFilePath) {
        e.preventDefault();
        saveFile();
      }
    });

    // ---- Resource monitor ----
    function fmtSpeed(b) {
      if (b < 1024) return b + ' B/s';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB/s';
      return (b / 1048576).toFixed(1) + ' MB/s';
    }

    async function updateStats() {
      try {
        const r = await fetch('/api/stats');
        const s = await r.json();

        document.getElementById('stat-cpu').textContent = s.cpu.toFixed(1) + '%';
        document.getElementById('bar-cpu').style.width = Math.min(100, s.cpu).toFixed(1) + '%';

        const ramPct = s.ram.total > 0 ? (s.ram.used / s.ram.total * 100) : 0;
        document.getElementById('stat-ram').textContent =
          (s.ram.used / 1073741824).toFixed(1) + ' / ' + (s.ram.total / 1073741824).toFixed(1) + ' GB';
        document.getElementById('bar-ram').style.width = ramPct.toFixed(1) + '%';

        const gpuWrap = document.getElementById('stat-gpu-wrap');
        const gpuSep = document.getElementById('stat-gpu-sep');
        if (s.gpu) {
          gpuWrap.style.display = 'flex';
          gpuSep.style.display = '';
          document.getElementById('stat-gpu').textContent =
            s.gpu.usage + '%  ' + s.gpu.memUsed + '/' + s.gpu.memTotal + ' MB';
          document.getElementById('bar-gpu').style.width = s.gpu.usage + '%';
          gpuWrap.title = s.gpu.name;
        } else {
          gpuWrap.style.display = 'none';
          gpuSep.style.display = 'none';
        }

        document.getElementById('stat-net').textContent =
          '\u2193 ' + fmtSpeed(s.net.rx) + '  \u2191 ' + fmtSpeed(s.net.tx);
      } catch(e) {}
    }

    setInterval(updateStats, 1000);
    updateStats();

    loadRoot("");
  </script>
</body>
</html>
