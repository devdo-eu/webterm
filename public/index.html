<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webterm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0d1117; overflow: hidden; font-family: Consolas, 'Courier New', monospace; color: #c9d1d9; }

    #app { display: flex; height: 100%; }

    /* --- Sidebar --- */
    #sidebar {
      width: 260px; flex-shrink: 0;
      background: #161b22;
      border-right: 1px solid #30363d;
      display: flex; flex-direction: column;
    }
    #sidebar-header {
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      background: #0d1117;
      font-size: 11px;
    }
    #sidebar-path {
      color: #8b949e;
      word-break: break-all;
      line-height: 1.4;
    }
    #sidebar-branch {
      color: #58a6ff;
      margin-top: 3px;
    }
    #file-list {
      flex: 1; overflow-y: auto; padding: 2px 0;
    }
    .file-entry {
      display: flex; align-items: center;
      padding: 2px 12px;
      cursor: pointer;
      font-size: 13px; line-height: 22px;
      user-select: none;
    }
    .file-entry:hover { background: #1c2128; }
    .file-icon { width: 18px; flex-shrink: 0; color: #484f58; font-size: 11px; }
    .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .is-dir .file-icon { color: #58a6ff; }
    .is-dir .file-name { color: #58a6ff; }
    .git-badge {
      font-size: 10px; font-weight: 700;
      margin-left: 6px; flex-shrink: 0;
    }
    .git-M  { color: #d29922; }
    .git-A  { color: #3fb950; }
    .git-D  { color: #f85149; }
    .git-R  { color: #a371f7; }
    .git-U  { color: #8b949e; }

    /* --- Terminal --- */
    #terminal-wrap { flex: 1; overflow: hidden; }
    #terminal { height: 100%; }

    /* scrollbar */
    #file-list::-webkit-scrollbar { width: 6px; }
    #file-list::-webkit-scrollbar-track { background: transparent; }
    #file-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <div id="sidebar-path"></div>
        <div id="sidebar-branch"></div>
      </div>
      <div id="file-list"></div>
    </div>
    <div id="terminal-wrap">
      <div id="terminal"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>
  <script>
    // ---- Terminal ----
    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      theme: { background: "#0d1117" },
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById("terminal"));
    fitAddon.fit();

    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.binaryType = "arraybuffer";

    ws.onopen = () => {
      ws.send("\x01" + JSON.stringify({ cols: term.cols, rows: term.rows }));
    };
    ws.onmessage = (e) => {
      const data = typeof e.data === "string" ? e.data : new Uint8Array(e.data);
      term.write(data);
    };
    ws.onclose = () => term.write("\r\n\x1b[31m[connection closed]\x1b[0m\r\n");

    term.onData((data) => ws.send(data));
    term.onResize(({ cols, rows }) => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send("\x01" + JSON.stringify({ cols, rows }));
      }
    });
    window.addEventListener("resize", () => fitAddon.fit());

    // ---- File panel ----
    let currentPath = "";

    function gitBadge(status) {
      if (!status) return "";
      const first = status[0] !== "?" ? status[0] : "";
      const second = status.length > 1 ? status[1] : "";
      // Pick most relevant: staged > unstaged > untracked
      let label, cls;
      if (status === "??") { label = "?"; cls = "git-U"; }
      else if (first === "A")  { label = "A"; cls = "git-A"; }
      else if (first === "R")  { label = "R"; cls = "git-R"; }
      else if (first === "D" || second === "D") { label = "D"; cls = "git-D"; }
      else if (first === "M" || second === "M") { label = "M"; cls = "git-M"; }
      else { label = status; cls = "git-U"; }
      return `<span class="git-badge ${cls}">${label}</span>`;
    }

    async function loadFiles(path) {
      const params = path ? `?path=${encodeURIComponent(path)}` : "";
      const resp = await fetch(`/api/files${params}`);
      const data = await resp.json();
      if (data.error) return;

      currentPath = data.path;
      document.getElementById("sidebar-path").textContent = currentPath;
      document.getElementById("sidebar-branch").textContent =
        data.gitBranch ? "\u2387 " + data.gitBranch : "";

      const list = document.getElementById("file-list");
      let html = `<div class="file-entry is-dir" data-dir="..">
        <span class="file-icon">\u25C2</span>
        <span class="file-name">..</span>
      </div>`;

      for (const f of data.entries) {
        const dirCls = f.isDir ? " is-dir" : "";
        const icon = f.isDir ? "\u25B8" : "\u00B7";
        html += `<div class="file-entry${dirCls}" data-${f.isDir ? "dir" : "file"}="${esc(f.name)}">
          <span class="file-icon">${icon}</span>
          <span class="file-name">${esc(f.name)}</span>
          ${gitBadge(f.git)}
        </div>`;
      }
      list.innerHTML = html;
    }

    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function parentPath(p) {
      const sep = p.includes("/") ? "/" : "\\";
      const parts = p.split(/[/\\]/);
      parts.pop();
      return parts.join(sep) || parts[0] || p;
    }

    document.getElementById("file-list").addEventListener("click", (e) => {
      const entry = e.target.closest(".file-entry");
      if (!entry) return;

      if (entry.dataset.dir !== undefined) {
        const name = entry.dataset.dir;
        if (name === "..") {
          loadFiles(parentPath(currentPath));
        } else {
          const sep = currentPath.includes("/") ? "/" : "\\";
          loadFiles(currentPath + sep + name);
        }
      }
    });

    loadFiles("");
  </script>
</body>
</html>
